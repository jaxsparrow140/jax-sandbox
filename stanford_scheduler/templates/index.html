<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stanford Course Scheduler</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--cardinal:#8C1515;--cardinal-dark:#6b1010;--dark:#1a1a2e;--darker:#16162a;--gray:#f4f4f8;--text:#333;--light-text:#888}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f0f5;color:var(--text);display:flex;min-height:100vh}
.main{flex:1;padding:24px 32px;overflow-y:auto;max-width:calc(100% - 340px)}
.sidebar{width:340px;background:var(--dark);color:#fff;padding:24px;display:flex;flex-direction:column;position:fixed;right:0;top:0;bottom:0;overflow-y:auto}
.logo{font-size:1.6rem;font-weight:700;color:var(--cardinal);margin-bottom:4px}
.subtitle{color:var(--light-text);font-size:.9rem;margin-bottom:28px}
.search-box{position:relative;margin-bottom:28px}
.search-box input{width:100%;padding:16px 20px;font-size:1.05rem;border:2px solid #ddd;border-radius:12px;outline:none;transition:border .2s}
.search-box input:focus{border-color:var(--cardinal)}
.search-box .hint{font-size:.8rem;color:var(--light-text);margin-top:6px;padding-left:4px}
.tabs{display:flex;gap:0;margin-bottom:20px;border-bottom:2px solid #ddd}
.tab{padding:10px 20px;cursor:pointer;font-weight:600;color:var(--light-text);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s}
.tab.active{color:var(--cardinal);border-bottom-color:var(--cardinal)}
.tab:hover{color:var(--cardinal-dark)}
.spinner{display:none;text-align:center;padding:40px}
.spinner.show{display:block}
.spinner::after{content:'';display:inline-block;width:36px;height:36px;border:4px solid #ddd;border-top-color:var(--cardinal);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.results{display:grid;gap:16px}
.card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06);transition:box-shadow .2s}
.card:hover{box-shadow:0 4px 16px rgba(0,0,0,.1)}
.card-code{font-weight:700;font-size:1.05rem;color:var(--cardinal)}
.card-title{font-weight:700;font-size:1.05rem;margin-left:4px}
.card-meta{font-size:.85rem;color:var(--light-text);margin:6px 0 8px}
.card-desc{font-size:.9rem;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;cursor:pointer;transition:all .2s}
.card-desc.expanded{-webkit-line-clamp:unset}
.card-category{display:inline-block;background:var(--gray);color:var(--cardinal);font-size:.75rem;font-weight:600;padding:3px 10px;border-radius:20px;margin-bottom:8px}
.card-why{font-size:.85rem;color:#555;font-style:italic;margin:8px 0;line-height:1.4}
.btn-add{background:var(--cardinal);color:#fff;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:.85rem;font-weight:600;margin-top:10px;transition:background .2s}
.btn-add:hover{background:var(--cardinal-dark)}
.btn-add.added{background:#555;cursor:default}
.empty-msg{text-align:center;color:var(--light-text);padding:40px 0;font-size:.95rem}
/* Sidebar */
.sidebar h2{font-size:1.2rem;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.schedule-list{flex:1;overflow-y:auto}
.schedule-item{background:var(--darker);border-radius:8px;padding:12px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.schedule-item .info{flex:1}
.schedule-item .info .name{font-size:.9rem;font-weight:600}
.schedule-item .info .units{font-size:.8rem;color:#999}
.btn-remove{background:none;border:none;color:#ff6b6b;cursor:pointer;font-size:1.1rem;padding:4px 8px}
.btn-remove:hover{color:#ff4444}
.sidebar-footer{border-top:1px solid rgba(255,255,255,.1);padding-top:16px;margin-top:16px}
.total-units{font-size:.95rem;margin-bottom:12px}
.total-units span{font-weight:700;color:var(--cardinal);font-size:1.1rem}
.btn-export{width:100%;padding:12px;background:var(--cardinal);color:#fff;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;transition:background .2s}
.btn-export:hover{background:var(--cardinal-dark)}
.btn-export:disabled{background:#555;cursor:default}
/* Toast */
.toast-container{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:1000;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{background:#333;color:#fff;padding:10px 20px;border-radius:8px;font-size:.9rem;animation:fadeInUp .3s,fadeOut .3s 2s forwards;pointer-events:none}
@keyframes fadeInUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeOut{to{opacity:0;transform:translateY(-10px)}}
/* Mobile */
@media(max-width:768px){
  .main{max-width:100%;padding:16px}
  .sidebar{position:relative;width:100%}
  body{flex-direction:column}
}
</style>
</head>
<body>
<div class="main">
  <div class="logo">Stanford Course Scheduler</div>
  <p class="subtitle">Search Stanford courses with natural language and build your schedule</p>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Try: machine learning for business people, generative AI courses..." autofocus>
    <div class="hint">Press Enter to search Stanford Explore Courses</div>
  </div>
  <div class="tabs">
    <div class="tab active" data-tab="search" onclick="switchTab('search')">Search Results</div>
    <div class="tab" data-tab="recs" onclick="switchTab('recs')">AI Recommendations</div>
  </div>
  <div class="spinner" id="spinner"></div>
  <div class="results" id="searchResults"></div>
  <div class="results" id="recsResults" style="display:none"></div>
</div>
<div class="sidebar">
  <h2>My Schedule</h2>
  <div class="schedule-list" id="scheduleList">
    <div class="empty-msg" id="emptyMsg">No courses added yet</div>
  </div>
  <div class="sidebar-footer">
    <div class="total-units">Total Units: <span id="totalUnits">0</span></div>
    <button class="btn-export" id="exportBtn" onclick="exportICS()" disabled>Download .ics</button>
  </div>
</div>
<div class="toast-container" id="toasts"></div>

<script>
const schedule = [];
const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');
const recsResults = document.getElementById('recsResults');
const spinner = document.getElementById('spinner');
const scheduleList = document.getElementById('scheduleList');
const emptyMsg = document.getElementById('emptyMsg');
const totalUnitsEl = document.getElementById('totalUnits');
const exportBtn = document.getElementById('exportBtn');

function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.getElementById('toasts').appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  searchResults.style.display = tab === 'search' ? 'grid' : 'none';
  recsResults.style.display = tab === 'recs' ? 'grid' : 'none';
  if (tab === 'recs' && recsResults.children.length === 0) loadRecs();
}

function isInSchedule(code) {
  return schedule.some(c => c.code === code);
}

function makeCard(course, isRec) {
  const div = document.createElement('div');
  div.className = 'card';
  const added = isInSchedule(course.code);
  div.innerHTML = `
    ${isRec ? '<div class="card-category">' + course.category + '</div>' : ''}
    <div><span class="card-code">${course.code}</span><span class="card-title"> — ${course.title}</span></div>
    <div class="card-meta">${course.units} units · ${course.term}</div>
    ${isRec ? '<div class="card-why">' + course.why_gsb + '</div>' : ''}
    <div class="card-desc" onclick="this.classList.toggle('expanded')">${course.description || 'No description available.'}</div>
    <button class="btn-add${added ? ' added' : ''}" onclick="addCourse(this, ${JSON.stringify(course).replace(/"/g, '&quot;')})">${added ? 'Added ✓' : '+ Add to Schedule'}</button>
  `;
  return div;
}

function addCourse(btn, course) {
  if (isInSchedule(course.code)) return;
  schedule.push(course);
  btn.classList.add('added');
  btn.textContent = 'Added ✓';
  // Update all cards with same code
  document.querySelectorAll('.btn-add').forEach(b => {
    try {
      const bCourse = JSON.parse(b.getAttribute('onclick').match(/addCourse\(this, (.+)\)$/)?.[1]?.replace(/&quot;/g, '"') || '{}');
      if (bCourse.code === course.code && b !== btn) {
        b.classList.add('added');
        b.textContent = 'Added ✓';
      }
    } catch(e) {}
  });
  renderSchedule();
  toast(`Added ${course.code} to schedule`);
}

function removeCourse(code) {
  const idx = schedule.findIndex(c => c.code === code);
  if (idx > -1) {
    const removed = schedule.splice(idx, 1)[0];
    renderSchedule();
    // Reset add buttons
    document.querySelectorAll('.btn-add.added').forEach(b => {
      try {
        const bCourse = JSON.parse(b.getAttribute('onclick').match(/addCourse\(this, (.+)\)$/)?.[1]?.replace(/&quot;/g, '"') || '{}');
        if (bCourse.code === code) {
          b.classList.remove('added');
          b.textContent = '+ Add to Schedule';
        }
      } catch(e) {}
    });
    toast(`Removed ${removed.code} from schedule`);
  }
}

function renderSchedule() {
  emptyMsg.style.display = schedule.length ? 'none' : 'block';
  const items = scheduleList.querySelectorAll('.schedule-item');
  items.forEach(i => i.remove());
  schedule.forEach(c => {
    const div = document.createElement('div');
    div.className = 'schedule-item';
    div.innerHTML = `
      <div class="info"><div class="name">${c.code} — ${c.title}</div><div class="units">${c.units} units</div></div>
      <button class="btn-remove" onclick="removeCourse('${c.code}')">&times;</button>
    `;
    scheduleList.insertBefore(div, emptyMsg);
  });
  const total = schedule.reduce((s, c) => {
    const n = parseFloat(c.units) || 0;
    return s + n;
  }, 0);
  totalUnitsEl.textContent = total;
  exportBtn.disabled = schedule.length === 0;
}

async function doSearch(query) {
  if (!query.trim()) return;
  spinner.classList.add('show');
  searchResults.innerHTML = '';
  switchTab('search');
  try {
    const resp = await fetch('/api/search?q=' + encodeURIComponent(query));
    const data = await resp.json();
    if (data.error) {
      searchResults.innerHTML = '<div class="empty-msg">Error: ' + data.error + '</div>';
    } else if (data.length === 0) {
      searchResults.innerHTML = '<div class="empty-msg">No courses found. Try different keywords.</div>';
    } else {
      data.forEach(c => searchResults.appendChild(makeCard(c, false)));
    }
  } catch(e) {
    searchResults.innerHTML = '<div class="empty-msg">Search failed. Please try again.</div>';
  }
  spinner.classList.remove('show');
}

async function loadRecs() {
  recsResults.innerHTML = '';
  try {
    const resp = await fetch('/api/recommendations');
    const data = await resp.json();
    data.forEach(c => recsResults.appendChild(makeCard(c, true)));
  } catch(e) {
    recsResults.innerHTML = '<div class="empty-msg">Failed to load recommendations.</div>';
  }
}

function exportICS() {
  if (schedule.length === 0) return;
  let ics = 'BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Stanford Scheduler//EN\r\n';
  const base = new Date(2025, 8, 22, 9, 0); // Sep 22, 2025 placeholder
  schedule.forEach((c, i) => {
    const start = new Date(base);
    start.setHours(9 + i);
    const end = new Date(start);
    end.setMinutes(end.getMinutes() + 50);
    const fmt = d => d.toISOString().replace(/[-:]/g, '').replace(/\.\d+/, '');
    ics += 'BEGIN:VEVENT\r\n';
    ics += 'SUMMARY:' + c.code + ' - ' + c.title + '\r\n';
    ics += 'DTSTART:' + fmt(start) + '\r\n';
    ics += 'DTEND:' + fmt(end) + '\r\n';
    ics += 'DESCRIPTION:' + (c.units || '') + ' units\\n' + (c.description || '').substring(0, 200).replace(/\n/g, '\\n') + '\r\n';
    ics += 'RRULE:FREQ=WEEKLY;COUNT=10\r\n';
    ics += 'END:VEVENT\r\n';
  });
  ics += 'END:VCALENDAR\r\n';
  const blob = new Blob([ics], {type: 'text/calendar'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'stanford_schedule.ics';
  a.click();
  toast('Schedule exported as .ics');
}

searchInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch(searchInput.value);
});
</script>
</body>
</html>
